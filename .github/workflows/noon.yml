name: オッズ反映版更新

# 毎日 JST 9:00 / 10:30 / 12:00(UTC 0:00 / 1:30 / 3:00)の3回、締切前レースの
# 最新オッズを取得し、各レースカードに「オッズ反映」タブを追加してサイトを再生成する。
# GitHubの定期実行は大きく遅延することがある(2026-07-09は約4時間遅れの実績)ため、
# 3回建てにして「どれかが昼までに刺さればよい」構成とする。処理は冪等で、
# 複数回動いた場合はその時点の最新オッズでタブが上書きされるだけ。
# 参考情報のみ: 勝負所判定・picks・採点・アーカイブには影響しない。
on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "30 1 * * *"
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: boat-noon
  cancel-in-progress: false

jobs:
  noon:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v4

      - name: Python準備
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 依存インストール
        run: pip install -r requirements.txt

      - name: DBキャッシュ復元
        uses: actions/cache/restore@v4
        with:
          path: boat.db
          key: boatdb-${{ github.run_id }}
          restore-keys: boatdb-

      - name: オッズ反映版の生成
        run: python noon_update.py
        working-directory: src

      # 注意: DBキャッシュは保存しない(オッズはDBに書かないため変更なし。
      # 朝・夜のワークフローが管理するキャッシュ系列を汚さない)

      - name: サイトへ公開(HTMLのみ・アーカイブとdataは触らない)
        run: |
          if [ ! -f reports/site/index.html ]; then
            echo "非開催のため更新なし。"
            exit 0
          fi
          # その日の初回実行か判定(朝の予想はオッズタブ無しでページを上書きするため、
          # 公開前のdocsにタブが残っていなければ本日初)。LINE通知の重複抑止に使う。
          if grep -q "オッズ反映⏱" docs/index.html docs/edogawa.html docs/heiwajima.html \
              docs/tokoname.html docs/amagasaki.html docs/wakamatsu.html 2>/dev/null; then
            echo "FIRST_ODDS_TODAY=no" >> "$GITHUB_ENV"
          else
            echo "FIRST_ODDS_TODAY=yes" >> "$GITHUB_ENV"
          fi
          cp reports/site/*.html docs/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/*.html
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "オッズ反映版更新"
            git pull --rebase --autostash || true
            git push
          fi

      - name: LINE通知(その日の初回のみ)
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          if [ ! -f reports/site/data/noon_notify.txt ]; then
            echo "オッズ反映なし(非開催・全レース締切済み等)のため通知対象なし。"
            exit 0
          fi
          if [ "$FIRST_ODDS_TODAY" != "yes" ]; then
            echo "本日2回目以降の更新のため通知はスキップ(オッズの上書きのみ)。"
            exit 0
          fi
          python src/notify_line.py "$(cat reports/site/data/noon_notify.txt)"
